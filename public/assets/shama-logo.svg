<?xml version="1.0" encoding="UTF-8"?>
<!-- Shama Landscape Architects logo - generated SVG approximation -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" role="img" aria-labelledby="titleDesc">
  <title id="titleDesc">Shama Landscape Architects logo</title>
  <defs>
    <clipPath id="circleClip"><circle cx="240" cy="180" r="170" /></clipPath>
    <style type="text/css"><![CDATA[
      .serif { font-family: 'Times New Roman', Times, serif; font-weight: 700; }
      .tagline { font-family: Arial, Helvetica, sans-serif; font-weight: 700; fill:#17883a }
    ]]></style>
  </defs>

  <!-- Left circular emblem -->
  <g transform="translate(0,0)">
    <!-- circle background halves -->
    <circle cx="240" cy="180" r="170" fill="#2E9CE2" />
    <path d="M240,10 A170,170 0 0,1 410,180 L240,350 A170,170 0 0,1 240,10 Z" fill="#C37A67" transform="translate(0,0) rotate(0 240 180)"/>

    <!-- white sweeping separator -->
    <path d="M115 125 C170 80, 320 60, 410 95 L410 105 C310 75, 170 95,115 145 Z" fill="#ffffff" opacity="1" transform="translate(-20,20) scale(0.9)" />

    <!-- green blades -->
    <g fill="#1F8E3F" transform="translate(0,0)">
      <path d="M190 70 C170 100, 180 130, 220 140 C210 120,200 95,190 70 Z" />
      <path d="M230 60 C210 95,220 135,270 140 C250 110,240 85,230 60 Z" />
      <path d="M150 140 C130 160,140 190,190 200 C180 170,165 150,150 140 Z" />
    </g>

    <!-- small roots at bottom left -->
    <g stroke="#C37A67" stroke-width="4" fill="none" stroke-linecap="round" transform="translate(60,260) rotate(-10)">
      <path d="M0 0 q10 10 20 0" />
      <path d="M12 2 q10 6 20 -2" />
      <path d="M24 6 q8 8 16 0" />
    </g>
  </g>

  <!-- Right-side text: stacked SHAMA / LANDSCAPE / ARCHITECTS -->
  <g transform="translate(330,90)" fill="#000000" text-anchor="start">
    <text x="0" y="40" class="serif" font-size="46">SH</text>
    <text x="46" y="40" class="serif" font-size="46">AMA</text>

    <text x="0" y="100" class="serif" font-size="46">LAND</text>
    <text x="96" y="100" class="serif" font-size="46">SCAPE</text>

    <text x="0" y="160" class="serif" font-size="46">ARCH</text>
    <text x="96" y="160" class="serif" font-size="46">ITECTS</text>
  </g>

  <!-- Tagline centered below -->
  <text x="240" y="470" text-anchor="middle" class="tagline" font-size="36">Imagine it . Build it . Have it</text>
</svg>
